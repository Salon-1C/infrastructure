# Segmentación de red (atributo de calidad: Seguridad)
#   blume_edge  — DMZ: único punto HTTP público (Traefik) + frontend
#   blume_app   — microservicios de aplicación
#   blume_data  — datos e infraestructura (BD, colas, almacenamiento)
#
# Ver: docs/atributo-calidad-seguridad-segmentacion-red.md

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --api.insecure=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./security/ca:/etc/traefik/certs:ro
    networks:
      - blume_edge
      - blume_app

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blume_data

  postgres_activities:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ACTIVITIES_DB_USER:-blume}
      POSTGRES_PASSWORD: ${ACTIVITIES_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${ACTIVITIES_DB_NAME:-stream_activities}
    volumes:
      - postgres_activities_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ACTIVITIES_DB_USER:-blume} -d ${ACTIVITIES_DB_NAME:-stream_activities}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blume_data

  blume-business-logic-ms:
    build:
      context: ../blume_business_logic_ms/backend-core
      dockerfile: ../Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "1.0"
          memory: 600M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://localhost}
      HLS_SIGNING_SECRET: ${HLS_SIGNING_SECRET:-unused}
      HLS_URL_TTL_SECONDS: ${HLS_URL_TTL_SECONDS:-3600}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-dummy}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-dummy}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase/serviceAccountKey.json
    volumes:
      - ../blume_business_logic_ms/firebase/serviceAccountKey.json:/app/firebase/serviceAccountKey.json:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.business.rule=PathPrefix(`/api`)
      - traefik.http.routers.business.entrypoints=web
      - traefik.http.routers.business.priority=10
      - traefik.http.services.business.loadbalancer.server.port=8082
      - traefik.http.services.business.loadbalancer.sticky.cookie=false
    networks:
      - blume_app
      - blume_data

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    networks:
      - blume_data

  blume_stream_ms:
    build:
      context: ../blume_stream_ms
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_started
    environment:
      HTTP_LISTEN_ADDR: ":8080"
      MEDIAMTX_HTTP_URL: "http://mediamtx:8889"
      # Public URL returned to browsers (Traefik will proxy /live paths to mediamtx)
      MEDIAMTX_PUBLIC_URL: "https://localhost"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_QUEUE: "recordings.ready"
      JWT_SECRET: ${JWT_SECRET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.stream.rule=Path(`/api/viewer-session`) || PathPrefix(`/api/viewers`) || Path(`/api/stats`) || Path(`/auth/mediamtx`)
      - traefik.http.routers.stream.entrypoints=web
      - traefik.http.routers.stream.priority=30
      - traefik.http.services.stream.loadbalancer.server.port=8080
    networks:
      - blume_app
      - blume_data

  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8889:8889"
    volumes:
      - ../blume_stream_ms/configs/mediamtx.compose.yml:/mediamtx.yml:ro
    depends_on:
      blume_stream_ms:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - blume_app

  recordings-mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${RECORD_DB_PASSWORD}
      MYSQL_DATABASE: ${RECORD_DB_NAME}
    volumes:
      - recordings_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${RECORD_DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blume_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio.rule=PathPrefix(`/recordings`)
      - traefik.http.routers.minio.entrypoints=web
      - traefik.http.routers.minio.priority=20
      - traefik.http.services.minio.loadbalancer.server.port=9000
    networks:
      - blume_data
      - blume_app

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do sleep 2; done;
      /usr/bin/mc mb -p local/${MINIO_BUCKET};
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET};
      exit 0;
      "
    networks:
      - blume_data

  blume_record_ms:
    build:
      context: ../blume_record_ms
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_started
      recordings-mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      HTTP_LISTEN_ADDR: ":8081"
      DB_HOST: recordings-mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${RECORD_DB_PASSWORD}
      DB_NAME: ${RECORD_DB_NAME}
      RECORDINGS_DIR: /recordings
      SCAN_INTERVAL: 10s
      STABLE_WINDOW: 20s
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RABBITMQ_QUEUE: "recordings.ready"
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${MINIO_BUCKET}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_USE_PATH_STYLE: "true"
      S3_PUBLIC_BASE_URL: https://localhost/recordings/${MINIO_BUCKET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.recordings.rule=PathPrefix(`/api/recordings`) || PathPrefix(`/internal/recordings`) || PathPrefix(`/internal/streams`)
      - traefik.http.routers.recordings.entrypoints=web
      - traefik.http.routers.recordings.priority=40
      - traefik.http.services.recordings.loadbalancer.server.port=8081
    networks:
      - blume_app
      - blume_data

  blume_stream_activities_ms:
    build:
      context: ../blume_stream_activities_ms
    restart: unless-stopped
    depends_on:
      postgres_activities:
        condition: service_healthy
    environment:
      PHX_SERVER: "true"
      MIX_ENV: prod
      PORT: "4000"
      PHX_HOST: localhost
      ELIXIR_ERL_OPTIONS: "+fnu"
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${ACTIVITIES_SECRET_KEY_BASE:-dev_only_change_me_use_mix_phx_gen_secret_min_64_chars________________________________}
      DATABASE_URL: postgresql://${ACTIVITIES_DB_USER:-blume}:${ACTIVITIES_DB_PASSWORD:-postgres}@postgres_activities:5432/${ACTIVITIES_DB_NAME:-stream_activities}
    labels:
      - traefik.enable=true
      - traefik.http.routers.activities.rule=PathPrefix(`/socket`) || PathPrefix(`/activities`)
      - traefik.http.routers.activities.entrypoints=web
      - traefik.http.routers.activities.priority=25
      - traefik.http.services.activities.loadbalancer.server.port=4000
    networks:
      - blume_app
      - blume_data

  blume_recomendations_ms:
    build:
      context: ../blume_recomendations_ms
    restart: unless-stopped
    depends_on:
      blume-business-logic-ms:
        condition: service_started
      blume_stream_activities_ms:
        condition: service_started
    environment:
      STREAMS_API_URL: http://blume-business-logic-ms:8082
      ACTIVITIES_API_URL: http://blume_stream_activities_ms:4000
      ALLOWED_ORIGINS: '["https://localhost"]'
    labels:
      - traefik.enable=true
      - traefik.http.routers.recommendations.rule=PathPrefix(`/api/v1`)
      - traefik.http.routers.recommendations.entrypoints=web
      - traefik.http.routers.recommendations.priority=15
      - traefik.http.services.recommendations.loadbalancer.server.port=8000
    networks:
      - blume_app

  blume_wa:
    build:
      context: ../blume_wa
      args:
        NEXT_PUBLIC_API_URL: "https://localhost"
        NEXT_PUBLIC_STREAM_URL: "https://localhost"
        NEXT_PUBLIC_RECORDINGS_URL: "https://localhost"
        NEXT_PUBLIC_PHOENIX_URL: "https://localhost"
        NEXT_PUBLIC_STREAM_KEY: ${STREAM_KEY}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
    environment:
      API_INTERNAL_URL: "https://traefik"
      RECORDINGS_INTERNAL_URL: "https://traefik"
      NODE_EXTRA_CA_CERTS: "/etc/ssl/certs/blume-internal-ca.crt"
    volumes:
      - ./security/ca/blume-internal-ca.crt:/etc/ssl/certs/blume-internal-ca.crt:ro
    restart: unless-stopped
    depends_on:
      blume-business-logic-ms:
        condition: service_started
      blume_stream_ms:
        condition: service_started
      blume_record_ms:
        condition: service_started
      blume_recomendations_ms:
        condition: service_started
      blume_stream_activities_ms:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=PathPrefix(`/`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.priority=1
      - traefik.http.routers.frontend.service=blume_wa
      - traefik.http.routers.streamsNextApi.rule=Path(`/api/streams`) || PathPrefix(`/api/streams/`)
      - traefik.http.routers.streamsNextApi.entrypoints=web
      - traefik.http.routers.streamsNextApi.priority=35
      - traefik.http.routers.streamsNextApi.service=blume_wa
      - traefik.http.services.blume_wa.loadbalancer.server.port=3000
    networks:
      - blume_edge

volumes:
  mysql_data:
  postgres_activities_data:
  recordings_mysql_data:
  minio_data:

networks:
  blume_edge:
    driver: bridge
    name: blume_edge
  blume_app:
    driver: bridge
    name: blume_app
  blume_data:
    driver: bridge
    name: blume_data
    internal: true
