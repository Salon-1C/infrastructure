http:
  routers:
    streamsNextApi:
      rule: "Path(`/api/streams`) || PathPrefix(`/api/streams/`)"
      entryPoints: ["web"]
      priority: 35
      service: blume_wa
    recommendations:
      rule: "PathPrefix(`/api/v1`)"
      entryPoints: ["web"]
      priority: 15
      service: recommendations
    recordings:
      rule: "PathPrefix(`/api/recordings`) || PathPrefix(`/internal/recordings`) || PathPrefix(`/internal/streams`)"
      entryPoints: ["web"]
      priority: 40
      service: recordings
    stream:
      rule: "Path(`/api/viewer-session`) || PathPrefix(`/api/viewers`) || Path(`/api/stats`) || Path(`/auth/mediamtx`)"
      entryPoints: ["web"]
      priority: 30
      service: stream
    business:
      rule: "PathPrefix(`/api`)"
      entryPoints: ["web"]
      priority: 10
      service: business
    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: ["web"]
      priority: 1
      service: blume_wa

  services:
    blume_wa:
      loadBalancer:
        servers:
          - url: "http://blume_wa:3000"
    business:
      loadBalancer:
        servers:
          - url: "http://blume-business-logic-ms:8082"
    stream:
      loadBalancer:
        servers:
          - url: "http://blume_stream_ms:8080"
    recordings:
      loadBalancer:
        servers:
          - url: "http://blume_record_ms:8081"
    recommendations:
      loadBalancer:
        servers:
          - url: "http://blume_recomendations_ms:8000"
