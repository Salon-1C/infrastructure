name: Build and push MediaMTX image

on:
  push:
    branches: [main]
    paths:
      - mediamtx/**
      - docker/mediamtx/**
      - .github/workflows/mediamtx-ecr.yml
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: blume-mediamtx
  ECS_CLUSTER: blume
  ECS_SERVICE: stream-engine

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_BASE="$REGISTRY/$ECR_REPOSITORY"
          docker build -f docker/mediamtx/Dockerfile -t "${IMAGE_BASE}:latest" -t "${IMAGE_BASE}:sha-${GITHUB_SHA}" .
          docker push "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:sha-${GITHUB_SHA}"

      - name: Redeploy stream-engine
        run: |
          aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment --no-cli-pager
